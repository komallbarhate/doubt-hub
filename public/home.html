<!DOCTYPE html>
<html>

<head>

<title>DoubtHub</title>

<style>

body{

background:linear-gradient(135deg,#4facfe,#00f2fe);

justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:50px;
border-radius:14px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
width:400px;
}

h1{
margin-top:0;
}

p{
color:#555;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
background:#4facfe;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2d8df5;
}

.teacher{
background:#ff7b00;
}

.teacher:hover{
background:#e66f00;
}

</style>

</head>

<body>

<div class="card">

<h1>📚 DoubtHub</h1>

<p>Ask doubts during lectures instantly</p>

<button onclick="goStudent()">Student Login</button>

<button class="teacher" onclick="goTeacher()">Teacher Login</button>

</div>

<script>

function goStudent(){
window.location="login.html"
}

function goTeacher(){
window.location="login.html"
}

</script>

</body>

</html>
